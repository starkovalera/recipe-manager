services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: recipe_manager
      POSTGRES_PASSWORD: recipe_manager
      POSTGRES_DB: recipe_manager_dev
    ports:
      - "5432:5432"
    volumes:
      - recipe_manager_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipe_manager -d recipe_manager_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - recipe_manager_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  krakend:
    build:
      context: ./infra/krakend
    ports:
      - "127.0.0.1:8081:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  recipe_manager_pgdata:
  recipe_manager_redisdata:
